[project]
site_name = "Guides Not Included"
site_description = "A popular website with guides for Oxygen Not Included revived from the depths of web archive."
site_author = "hadook"
site_url = "https://hadook.github.io/guides-not-included"

repo_url = "https://github.com/hadook/guides-not-included"
repo_name = "hadook/guides-not-included"
# copyright = "Copyright &copy; 2026 hadook."

nav = [
  { "Home" = "index.md" },
  { "Builds" = [
    "builds/index.md",
    { "Thermo-Nullifier" = "builds/thermo-nullifier.md" },
    { "Carbon Skimmer" = "builds/carbon-skimmer.md" },
    { "Germy Water" = "builds/germy-water.md" },
    { "Hydrogen Vent" = "builds/hydrogen-vent.md" },
    { "Liquid Lock" = "builds/liquid-lock.md" },
    { "Liquid Hydrogen / Oxygen" = "builds/liquid-hydrogen-oxygen.md" },
    { "Metal Refinery" = "builds/metal-refinery.md" },
    { "Oil Well" = "builds/oil-well.md" },
    { "SPOM Oxygen: 1kg/s" = "builds/spom-1kg.md" },
    { "SPOM Oxygen: 3kg/s" = "builds/spom-3kg.md" },
  ] },
  { "Guides" = [
    "guides/index.md",
  ] },
  { "Resources" = "resources.md" },
  { "About" = "about.md" },
  { "License" = "site-license.md" },
]

[project.theme]
# variant = "classic"
favicon = "img/icon-hatch.png"
# logo = "img/icon-hatch.png"
language = "en"
# custom_dir = "overrides"
features = [
  "announce.dismiss",
  #"content.action.edit",
  # "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  # "navigation.expand",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  #"navigation.prune",
  # "navigation.sections",
  # "navigation.tabs",
  # "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
  # "toc.integrate",
]

[project.theme.icon]
# logo = "lucide/book-open"
repo = "fontawesome/brands/github"
admonition = { abstract = "lucide/hammer" }

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

# extensions
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.blocks.caption]
